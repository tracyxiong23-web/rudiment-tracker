<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>40 Rudiments — Drum Practice Tracker</title>
    <meta name="description" content="Track tempo and practice history for all 40 PAS drum rudiments." />
    <meta name="theme-color" content="#F1EAD9" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Rudiments" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <style>
      html, body { margin: 0; padding: 0; overscroll-behavior: none; }
      html { height: 100%; }
      body { min-height: 100%; min-height: 100dvh; }
      #root { min-height: 100vh; min-height: 100dvh; }
      * { -webkit-tap-highlight-color: transparent; }
      #launch-splash {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        z-index: 999;
      }
      #launch-splash img { width: 64px; height: 64px; border-radius: 16px; animation: splashPulse 1.1s ease-in-out infinite; }
      @keyframes splashPulse { 0%, 100% { opacity: 0.55; transform: scale(0.96); } 50% { opacity: 1; transform: scale(1); } }
    </style>
    <script>
      (function () {
        var bgByTheme = { walnut: "#0A0908", midnight: "#0A0D13", crimson: "#100B0A", parchment: "#F1EAD9" };
        var key = localStorage.getItem("rudiment-theme-pref");
        var bg = bgByTheme[key] || bgByTheme.parchment;
        document.documentElement.style.background = bg;
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute("content", bg);
        document.addEventListener("DOMContentLoaded", function () {
          document.body.style.background = bg;
        });
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div id="launch-splash">
        <img src="/icon-192.png" alt="" />
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
